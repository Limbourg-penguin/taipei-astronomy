<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台北深空觀測儀 Pro - v24.0 物理同步修正</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        #hud { position: absolute; top: 30px; left: 30px; color: #fff; border-left: 2px solid #00d4ff; padding-left: 20px; z-index: 10; pointer-events: none; }
        #city-list { position: absolute; top: 100px; left: 30px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .city-btn {
            background: rgba(0, 10, 20, 0.7); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.4);
            padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .city-btn:hover { background: #00d4ff; color: #000; }
        #control-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 100; background: rgba(5, 5, 10, 0.9); padding: 20px 40px; 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        #month-num { color: #fff; font-size: 28px; font-weight: bold; font-family: monospace; letter-spacing: 2px; }
        .slider-container { width: 450px; }
        .astronomy-slider { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.2); outline: none; }
        .astronomy-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #00d4ff; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="hud">
        <h1 style="margin:0; font-size:22px; letter-spacing:4px;">STATION SYNC</h1>
        <div id="status-bar" style="font-size:12px; color:#00d4ff;">狀態：物理嵌套同步已啟用</div>
    </div>

    <div id="city-list">
        <button class="city-btn" onclick="bindCameraToSurface(25.03, 121.56, '台北')">🔭 台北 (Taipei)</button>
        <button class="city-btn" onclick="bindCameraToSurface(35.68, 139.76, '東京')">🔭 東京 (Tokyo)</button>
        <button class="city-btn" onclick="bindCameraToSurface(-33.86, 151.20, '雪梨')">🔭 雪梨 (Sydney)</button>
        <button class="city-btn" onclick="resetToSpaceView()">🌌 返回宇宙視角</button>
    </div>

    <div id="control-panel">
        <div id="month-num">08.00</div>
        <div class="slider-container">
            <input type="range" id="monthSlider" class="astronomy-slider" min="1" max="12" step="0.01" value="8">
        </div>
        <div style="display:flex; gap:20px; color:#fff; font-size:12px;">
            <label><input type="checkbox" id="autoCheck" checked> 地球自轉</label>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const SKY_RADIUS = 8000;
        const EARTH_RADIUS = 800;
        let earthMesh, starGroup, composer, controls, camera;
        let obsPlatform; // 關鍵：觀測平台

        const scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 1000000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.85));

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function init() {
            const texLoader = new THREE.TextureLoader();
            
            // 地球自轉組
            earthMesh = new THREE.Group();
            scene.add(earthMesh);

            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(EARTH_RADIUS, 64, 64),
                new THREE.MeshPhongMaterial({
                    map: texLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                    bumpMap: texLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
                    bumpScale: 5
                })
            );
            earthMesh.add(sphere);

            // 觀測平台（掛在地球上，隨地球轉）
            obsPlatform = new THREE.Group();
            earthMesh.add(obsPlatform);

            scene.add(new THREE.AmbientLight(0x666666));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5000, 2000, 5000);
            scene.add(sun);

            starGroup = new THREE.Group();
            scene.add(starGroup);
            loadStars();

            resetToSpaceView();
        }

        async function loadStars() {
            const res = await fetch('./stars.json');
            const data = await res.json();
            const starPositions = {};
            data.constellations.forEach(con => {
                con.stars.forEach(star => {
                    const raR = (star.ra * 15) * (Math.PI/180);
                    const decR = (star.dec) * (Math.PI/180);
                    const pos = new THREE.Vector3(
                        SKY_RADIUS * Math.cos(decR) * Math.cos(raR),
                        SKY_RADIUS * Math.sin(decR),
                        SKY_RADIUS * Math.cos(decR) * Math.sin(raR)
                    );
                    starPositions[star.id] = pos;
                    const s = new THREE.Mesh(new THREE.SphereGeometry(12, 8, 8), new THREE.MeshBasicMaterial({ color: star.color }));
                    s.position.copy(pos);
                    starGroup.add(s);
                });
                con.links.forEach(pair => {
                    const p1 = starPositions[pair[0]], p2 = starPositions[pair[1]];
                    if(p1 && p2) {
                        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.2 }));
                        starGroup.add(line);
                    }
                });
            });
        }

        // --- 修正：物理掛載視角 ---
        window.bindCameraToSurface = function(lat, lon, name) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            // 設置平台在地表的位置（注意此時不考慮地球旋轉，因為平台是地球的子對象）
            obsPlatform.position.set(
                EARTH_RADIUS * Math.sin(phi) * Math.cos(theta),
                EARTH_RADIUS * Math.cos(phi),
                EARTH_RADIUS * Math.sin(phi) * Math.sin(theta)
            );

            // 相機移動到平台位置並朝外看
            camera.position.set(0, 0, 0); 
            obsPlatform.add(camera); // 關鍵：將相機掛載到隨地球轉動的平台上
            camera.position.set(50, 50, 50); // 稍微偏移地表
            
            const lookOut = obsPlatform.position.clone().normalize().multiplyScalar(1000);
            camera.lookAt(lookOut);
            controls.target.copy(lookOut);

            document.getElementById('status-bar').textContent = `已鎖定觀測站：${name}`;
        };

        window.resetToSpaceView = () => {
            scene.add(camera); // 將相機移回場景，脫離地球旋轉
            camera.position.set(0, 2000, 5000);
            controls.target.set(0, 0, 0);
            document.getElementById('status-bar').textContent = `宇宙模式：星星背景固定`;
        };

        const slider = document.getElementById('monthSlider');
        function animate() {
            requestAnimationFrame(animate);
            if(document.getElementById('autoCheck').checked) {
                let v = parseFloat(slider.value) + 0.0004;
                if(v > 12) v = 1;
                slider.value = v;
                document.getElementById('month-num').textContent = v.toFixed(2);
            }
            
            // 旋轉整個地球組（包含掛載在上面的觀測平台和相機）
            earthMesh.rotation.y = (parseFloat(slider.value) - 1) * (Math.PI / 6);
            
            controls.update();
            composer.render();
        }

        init(); animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
